ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.2
    two_d_mode: true
    transform_time_offset: 0.0
    transform_timeout: 0.1
    print_diagnostics: true
    map_frame:       map
    odom_frame:      odom
    base_link_frame: base_link
    world_frame:     odom
    publish_tf:      true

    # ── Wheel odometry — velocity only ───────────────────────────────
    odom0: /diff_drive_controller/odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true,  false, false,   # vx only
                   false, false, true,    # vyaw only
                   false, false, false]

    # ── Visual odometry — velocity only ──────────────────────────────
    odom1: /visual_odom
    odom1_config: [false, false, false,
                   false, false, true,
                   true,  false, false,   # vx only
                   false, false, true,    # vyaw only
                   false, false, false]

    # ── IMU — yaw + angular velocity only ────────────────────────────
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,    # yaw
                  false, false, false,
                  false, false, true,    # vyaw
                  false, false, false]
